name: 🚀 部署网站

on:
  # 推送到 main 分支时自动触发
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'

  # 允许手动触发
  workflow_dispatch:

# 允许写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署，不排队
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装 Node 依赖
        run: npm ci

      - name: 构建 VitePress
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4