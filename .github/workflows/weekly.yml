name: War3 Wiki 每周全量扫描

on:
  schedule:
    - cron: '0 19 * * 1'   # UTC 周一 19:00 = 北京时间周一 03:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180    # 全量扫描给更长时间

    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: 安装 Python 依赖
        run: pip install -r pipeline/requirements.txt

      - name: 运行每周全量扫描
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SEARCH_ENGINE: ${{ vars.SEARCH_ENGINE || 'duckduckgo' }}
          MAX_TOPICS_PER_RUN: ${{ vars.MAX_TOPICS_PER_RUN || '20' }}
          MAX_RETRY_COUNT: ${{ vars.MAX_RETRY_COUNT || '3' }}
          RETRY_WAIT_SECONDS: ${{ vars.RETRY_WAIT_SECONDS || '60' }}
          CONV_SIMULATOR_MODEL: ${{ vars.CONV_SIMULATOR_MODEL || 'gpt-3.5-turbo' }}
          ARTICLE_GEN_MODEL: ${{ vars.ARTICLE_GEN_MODEL || 'gpt-4o' }}
        run: |
          cd pipeline
          python run_weekly.py