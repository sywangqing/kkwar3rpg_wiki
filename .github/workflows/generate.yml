name: 📝 生成文章

on:
  # 每天北京时间 10:00 自动运行（UTC 02:00）
  schedule:
    - cron: '0 2 * * *'

  # 允许手动触发
  workflow_dispatch:
    inputs:
      max_topics:
        description: '本次最多生成几篇文章'
        required: false
        default: '10'
      force_rewrite:
        description: '是否强制重写已有文章'
        required: false
        default: 'false'
        type: boolean

# 允许 bot 写回文章到仓库
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements.txt'

      - name: 安装 Python 依赖
        run: pip install -r pipeline/requirements.txt

      - name: 生成文章
        working-directory: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.minimax.chat/v1
          AGENT_LLM_MODEL: openai/MiniMax-M2.7-highspeed
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          AGENT_CONCURRENCY: '3'
          AGENT_QUALITY_THRESHOLD: '0.7'
          AGENT_MAX_REVIEW_LOOPS: '2'
          MAX_TOPICS_PER_RUN: ${{ github.event.inputs.max_topics || '10' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force_rewrite }}" = "true" ]; then
            ARGS="--force-rewrite"
          fi
          python run_incremental.py $ARGS

      - name: 提交并推送文章
        run: |
          git config user.name "war3-wiki-bot"
          git config user.email "bot@war3-wiki.auto"
          git add .
          git diff --cached --quiet || git commit -m "[bot] Auto-generate articles $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push