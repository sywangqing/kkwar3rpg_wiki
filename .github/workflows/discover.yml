name: 🔍 发现新主题

on:
  # 每周一北京时间 09:00 自动运行（UTC 01:00）
  schedule:
    - cron: '0 1 * * 1'

  # 允许手动触发
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pipeline/requirements.txt'

      - name: 安装 Python 依赖
        run: pip install -r pipeline/requirements.txt

      - name: 扫描论坛，发现新主题
        working-directory: pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: https://api.minimax.chat/v1
          AGENT_LLM_MODEL: openai/MiniMax-M2.7-highspeed
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: war3-wiki-bot/1.0
        run: python run_discovery.py

      - name: 提交新发现的主题
        run: |
          git config user.name "war3-wiki-bot"
          git config user.email "bot@war3-wiki.auto"
          git add pipeline/cache/topics.json
          git diff --cached --quiet || git commit -m "[bot] Discover new topics $(date -u '+%Y-%m-%d')"
          git push